{% extends "base.html" %}

{% block title %}Password Reset Complete - Meal Planner{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="card-dark p-8" style="max-width: 400px; width: 100%;">
        <h2 class="text-2xl font-medium text-center mb-2">Password Reset</h2>
        <p class="text-center mb-6" style="color: var(--text-light-gray);">
            Your password has been set. You can now log in with your new password.
        </p>
        
        <a href="{% url 'login' %}" class="btn-pill w-full text-center block">Login</a>
    </div>
</div>
{% endblock %}
