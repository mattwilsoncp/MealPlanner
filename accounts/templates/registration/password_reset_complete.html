{% extends "base.html" %}

{% block title %}Password Reset Complete - Meal Planner{% endblock %}

{% block content %}
<section class="vp-hero">
    <div class="vp-hero-inner grid md:grid-cols-2 gap-16 items-end">
        <div>
            <span class="vp-eyebrow">All Set</span>
            <h1 class="vp-display">You're<br>back in.</h1>
            <p class="vp-subhead">Your password has been reset. Sign in with your new credentials to keep planning meals.</p>
        </div>
        <div class="vp-card">
            <a href="{% url 'login' %}" class="vp-btn-primary w-full" style="text-align: center;">Sign In</a>
        </div>
    </div>
</section>
{% endblock %}
