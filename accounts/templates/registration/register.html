<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Meal Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/dist/daisyui.min.css" rel="stylesheet" type="text/css" />
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center">
    <div class="card bg-base-100 w-full max-w-sm shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold text-center w-full mb-4">Register</h2>
            
            {% if form.errors %}
            <div class="alert alert-error mb-4">
                <span>Please correct the errors below.</span>
            </div>
            {% endif %}
            
            <form method="post">
                {% csrf_token %}
                
                <div class="form-control mb-4">
                    <label class="label" for="id_email">
                        <span class="label-text">Email</span>
                    </label>
                    <input type="email" name="email" id="id_email" class="input input-bordered" required>
                </div>
                
                <div class="form-control mb-4">
                    <label class="label" for="id_username">
                        <span class="label-text">Username</span>
                    </label>
                    <input type="text" name="username" id="id_username" class="input input-bordered" required>
                </div>
                
                <div class="form-control mb-4">
                    <label class="label" for="id_password1">
                        <span class="label-text">Password</span>
                    </label>
                    <input type="password" name="password1" id="id_password1" class="input input-bordered" required>
                </div>
                
                <div class="form-control mb-4">
                    <label class="label" for="id_password2">
                        <span class="label-text">Confirm Password</span>
                    </label>
                    <input type="password" name="password2" id="id_password2" class="input input-bordered" required>
                </div>
                
                <div class="form-control mb-4">
                    <label class="label" for="id_household_name">
                        <span class="label-text">Household Name (optional)</span>
                    </label>
                    <input type="text" name="household_name" id="id_household_name" class="input input-bordered" placeholder="My Household">
                    <label class="label">
                        <span class="label-text-alt">Give your household a name, or we'll create one for you</span>
                    </label>
                </div>
                
                <div class="form-control mt-6">
                    <button type="submit" class="btn btn-primary">Register</button>
                </div>
            </form>
            
            <div class="divider">OR</div>
            
            <p class="text-center">
                Already have an account?
                <a href="{% url 'login' %}" class="link link-primary">Login</a>
            </p>
        </div>
    </div>
</body>
</html>
