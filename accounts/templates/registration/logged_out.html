{% extends "base.html" %}

{% block title %}Logged Out - Meal Planner{% endblock %}

{% block content %}
<section class="vp-hero">
    <div class="vp-hero-inner grid md:grid-cols-2 gap-16 items-end">
        <div>
            <span class="vp-eyebrow">Session Ended</span>
            <h1 class="vp-display">You're<br>logged out.</h1>
            <p class="vp-subhead">Come back soon. Your kitchen will be here.</p>
        </div>
        <div class="vp-card">
            <p style="color: var(--text-secondary); font-size: 1.125rem; margin-bottom: 32px;">
                You've been signed out successfully.
            </p>
            <a href="{% url 'login' %}" class="vp-btn-primary">Sign In Again</a>
        </div>
    </div>
</section>
{% endblock %}
