{% extends "base.html" %}

{% block title %}Logged Out - Meal Planner{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="card-clay p-8 text-center" style="max-width: 400px; width: 100%;">
        <h2 class="text-2xl font-semibold mb-4" style="letter-spacing: -0.64px;">Logged Out</h2>
        
        <div class="alert-clay mb-4" style="background: var(--matcha-300); color: var(--text-black);">
            <span>You have been logged out successfully.</span>
        </div>
        
        <p style="color: var(--text-silver); margin-bottom: 24px;">
            Come back soon!
        </p>
        
        <a href="{% url 'login' %}" class="btn-clay w-full">
            Login Again
        </a>
    </div>
</div>
{% endblock %}
