<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out - Meal Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/dist/daisyui.min.css" rel="stylesheet" type="text/css" />
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center">
    <div class="card bg-base-100 w-full max-w-sm shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold text-center w-full mb-4">Logged Out</h2>
            
            <div class="alert alert-success mb-4">
                <span>You have been logged out successfully.</span>
            </div>
            
            <p class="text-center mb-4">
                Come back soon!
            </p>
            
            <div class="form-control mt-6">
                <a href="{% url 'login' %}" class="btn btn-primary">Login Again</a>
            </div>
        </div>
    </div>
</body>
</html>
