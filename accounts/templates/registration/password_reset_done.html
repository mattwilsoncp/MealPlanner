{% extends "base.html" %}

{% block title %}Password Reset Sent - Meal Planner{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="card-dark p-8" style="max-width: 400px; width: 100%;">
        <h2 class="text-2xl font-medium text-center mb-2">Check Your Email</h2>
        <p class="text-center mb-6" style="color: var(--text-light-gray);">
            If an account exists with that email address, we've sent a password reset link.
        </p>
        <p class="text-center text-sm mb-6" style="color: var(--text-light-gray);">
            Didn't receive it? Check your spam folder or try again.
        </p>
        
        <a href="{% url 'login' %}" class="btn-pill w-full text-center block">Back to Login</a>
    </div>
</div>
{% endblock %}
