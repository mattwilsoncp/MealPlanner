<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Meal Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/dist/daisyui.min.css" rel="stylesheet" type="text/css" />
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center">
    <div class="card bg-base-100 w-full max-w-sm shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold text-center w-full mb-4">Login</h2>
            
            {% if form.errors %}
            <div class="alert alert-error mb-4">
                <span>Please correct the errors below.</span>
            </div>
            {% endif %}
            
            <form method="post">
                {% csrf_token %}
                
                <div class="form-control mb-4">
                    <label class="label" for="id_username">
                        <span class="label-text">Username</span>
                    </label>
                    <input type="text" name="username" id="id_username" class="input input-bordered" required>
                </div>
                
                <div class="form-control mb-4">
                    <label class="label" for="id_password">
                        <span class="label-text">Password</span>
                    </label>
                    <input type="password" name="password" id="id_password" class="input input-bordered" required>
                </div>
                
                {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
                
                <div class="form-control mt-6">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>
            </form>
            
            <div class="divider">OR</div>
            
            <p class="text-center">
                Don't have an account?
                <a href="{% url 'register' %}" class="link link-primary">Register</a>
            </p>
        </div>
    </div>
</body>
</html>
