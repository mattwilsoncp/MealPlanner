{% extends "base.html" %}

{% block title %}Mark Recipe Ready{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="card-dark">
        <div class="p-6">
            <h2 class="text-xl font-medium">Mark Recipe as Ready?</h2>
            <p class="my-4">
                Are you sure you want to mark "<strong>{{ object.title }}</strong>" as ready?
                This will remove it from the review queue.
            </p>

            <form method="post">
                {% csrf_token %}
                <div class="flex justify-end gap-2 mt-4">
                    <a href="{% url 'reviews:review_queue' %}" class="btn-ghost">No, Go Back</a>
                    <button type="submit" class="btn-pill">Yes, Mark Ready</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
