{% comment %}Reusable modal component. Usage:
    {% include 'includes/modal.html' with modal_id='my-modal' modal_title='My Title' %}
    Or with Alpine.js:
    <button @click="$dispatch('open-modal', {id: 'my-modal'})">Open</button>
{% endcomment %}
{% load static %}

<template x-teleport="body">
    <dialog id="{{ modal_id }}" class="modal" @open-modal.window="if ($event.detail.id === '{{ modal_id }}') $el.showModal()" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-dark); border: 1px solid var(--border-dark); border-radius: 16px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
        <div>
            <h3 class="font-medium text-lg mb-4">{{ modal_title }}</h3>
            {% if modal_content %}
                {{ modal_content }}
            {% else %}
                {% block modal_body %}{% endblock %}
            {% endif %}
            <div class="flex gap-2 mt-4 justify-end">
                <form method="dialog">
                    <button class="btn-ghost" aria-label="Close">Close</button>
                </form>
                {% block modal_actions %}{% endblock %}
            </div>
        </div>
    </dialog>
</template>

<script>
    function openModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) modal.showModal();
    }
    
    function closeModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) modal.close();
    }
</script>
