{% extends "base.html" %}

{% block title %}Scan Barcode{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6" x-data="barcodeScan()">
    <div class="flex flex-wrap justify-between items-center gap-2">
        <div>
            <h1 class="text-2xl font-medium">Barcode Scan</h1>
            <p class="text-sm" style="color: var(--text-light-gray);">Scan a barcode using your camera or enter it manually.</p>
        </div>
        <div class="flex gap-2">
            <a href="{% url 'inventory:inventory_expiring' %}" class="btn-ghost">Expiring Items</a>
            <a href="{% url 'inventory:inventory_list' %}" class="btn-ghost">Back to Inventory</a>
        </div>
    </div>

    <div class="card-dark">
        <div class="p-6 space-y-4">
            <form method="post" @submit.prevent="lookupBarcode" class="space-y-3">
                {% csrf_token %}
                <label class="block">
                    <span class="label-dark">Barcode</span>
                    <div class="flex gap-2">
                        <input
                            type="text"
                            x-model="barcode"
                            class="input-dark flex-1"
                            inputmode="numeric"
                            pattern="[0-9]{8,14}"
                            maxlength="14"
                            placeholder="Enter 8-14 digit barcode"
                            required
                        >
                        <button type="button" @click="toggleScanner" class="btn-pill" :disabled="scannerActive">
                            <span x-show="!scannerActive">Start Scanner</span>
                            <span x-show="scannerActive">Stop Scanner</span>
                        </button>
                    </div>
                </label>
                <button type="submit" class="btn-pill" :disabled="isLoading">
                    <span x-show="!isLoading">Lookup Barcode</span>
                    <span x-show="isLoading">Looking up...</span>
                </button>
            </form>
        </div>
    </div>

    <div x-show="scannerActive" x-cloak class="card-dark" style="border: 2px solid var(--brand-green);">
        <div class="p-4">
            <div id="reader" class="w-full max-w-md mx-auto"></div>
            <p class="text-center text-sm mt-2 text-gray-400">Align the barcode within the frame.</p>
        </div>
    </div>

    <template x-if="resultType === 'local'">
        <div class="card-dark" style="border: 2px solid var(--brand-green);">
            <div class="p-6">
                <h2 class="text-lg font-medium" style="color: var(--brand-green);">Already in Your Inventory</h2>
                <p><strong x-text="result.item.name"></strong> is already tracked for your household.</p>
                <p class="text-sm" style="color: var(--text-light-gray);">Barcode: <span x-text="result.item.barcode"></span></p>
                <p class="text-sm" style="color: var(--text-light-gray);">Quantity: <span x-text="result.item.quantity"></span> <span x-text="result.item.unit"></span></p>
            </div>
        </div>
    </template>

    <template x-if="resultType === 'upc'">
        <div class="card-dark" style="border: 2px solid var(--green-link);">
            <div class="p-6 space-y-3">
                <h2 class="text-lg font-medium" style="color: var(--green-link);">UPC Match Found</h2>
                <p><strong x-text="result.item.title || 'Scanned Item'"></strong></p>
                <p class="text-sm" style="color: var(--text-light-gray);">Brand: <span x-text="result.item.brand || '—'"></span></p>
                <p class="text-sm" style="color: var(--text-light-gray);">Size: <span x-text="result.item.size || '—'"></span></p>
                <p class="text-sm" style="color: var(--text-light-gray);">Category: <span x-text="result.item.category || 'other'"></span></p>

                <form method="post" action="{% url 'inventory:barcode_create_api' %}" @submit.prevent="createItem" class="pt-2">
                    {% csrf_token %}
                    <button type="submit" class="btn-pill" :disabled="isCreating">
                        <span x-show="!isCreating">Create Item</span>
                        <span x-show="isCreating">Creating...</span>
                    </button>
                </form>
            </div>
        </div>
    </template>

    <template x-if="resultType === 'error'">
        <div class="alert-dark">
            <span x-text="errorMessage"></span>
        </div>
    </template>

    <template x-if="resultType === 'created'">
        <div class="alert-success">
            <span>Created inventory item: <strong x-text="createdName"></strong>.</span>
        </div>
    </template>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/html5-qrcode"></script>
<script>
function barcodeScan() {
    return {
        barcode: "",
        isLoading: false,
        isCreating: false,
        scannerActive: false,
        resultType: null,
        result: {},
        errorMessage: "",
        createdName: "",
        scanner: null,

        get csrfToken() {
            const tokenInput = document.querySelector('input[name="csrfmiddlewaretoken"]');
            return tokenInput ? tokenInput.value : "";
        },

        async toggleScanner() {
            this.scannerActive = !this.scannerActive;
            if (this.scannerActive) {
                this.scanner = new Html5Qrcode("reader");
                this.scanner.start(
                    { facingMode: "environment" },
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 150 },
                    },
                    (decodedText) => {
                        this.barcode = decodedText;
                        this.lookupBarcode();
                    },
                    (errorMessage) => {
                        // Silent error logging for scanner
                    }
                ).catch(err => {
                    this.errorMessage = "Camera error: " + err.message;
                    this.resultType = "error";
                    this.scannerActive = false;
                });
            } else {
                if (this.scanner) {
                    this.scanner.stop().then(() => {
                        this.scanner = null;
                    }).catch(err => {
                        console.error(err);
                    });
                }
            }
        },

        async lookupBarcode() {
            if (!this.barcode) return;
            this.isLoading = true;
            this.resultType = null;
            this.errorMessage = "";

            const body = new URLSearchParams({ barcode: this.barcode });
            const response = await fetch("{% url 'inventory:barcode_lookup_api' %}", {
                method: "POST",
                headers: {
                    "X-CSRFToken": this.csrfToken,
                    "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
                },
                body: body.toString(),
            });

            const payload = await response.json();
            if (!response.ok) {
                this.resultType = "error";
                this.errorMessage = payload.message || "Lookup failed.";
                this.isLoading = false;
                return;
            }

            this.result = payload;
            this.resultType = payload.source;
            this.isLoading = false;
            
            // Stop scanner after successful lookup
            if (this.scannerActive) {
                this.toggleScanner();
            }
        },

        async createItem() {
            if (!this.result.item) return;

            this.isCreating = true;
            const payload = new URLSearchParams({
                title: this.result.item.title || "",
                brand: this.result.item.brand || "",
                size: this.result.item.size || "",
                image_url: this.result.item.image_url || "",
                category: this.result.item.category || "other",
                barcode: this.result.item.barcode || this.barcode,
            });

            const response = await fetch("{% url 'inventory:barcode_create_api' %}", {
                method: "POST",
                headers: {
                    "X-CSRFToken": this.csrfToken,
                    "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
                },
                body: payload.toString(),
            });

            const data = await response.json();
            if (!response.ok) {
                this.resultType = "error";
                this.errorMessage = data.message || "Could not create item.";
                this.isCreating = false;
                return;
            }

            this.createdName = data.name;
            this.resultType = "created";
            this.isCreating = false;
        },
    }
}
</script>
{% endblock %}
