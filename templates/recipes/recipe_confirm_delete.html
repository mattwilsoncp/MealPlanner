{% extends "base.html" %}

{% block title %}Delete Recipe - Meal Planner{% endblock %}

{% block content %}
<section class="vp-section" style="max-width: 640px;">
    <a href="{% url 'recipes:recipe_detail' object.pk %}" class="vp-label-mono" style="color: var(--text-secondary); margin-bottom: 24px; display: inline-block; text-decoration: none;">&larr; Recipe</a>

    <span class="vp-eyebrow">Delete Recipe</span>
    <h1 class="vp-display-secondary">Delete &ldquo;{{ object.title }}&rdquo;?</h1>
    <p class="vp-subhead" style="font-size: 1.125rem; margin-top: 12px;">This action cannot be undone.</p>

    <form method="post" class="vp-card" style="margin-top: 40px;">
        {% csrf_token %}
        <hr class="vp-divider" style="margin: 0 0 24px;">
        <div style="display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap;">
            <a href="{% url 'recipes:recipe_detail' object.pk %}" class="vp-btn-ghost">Cancel</a>
            <button type="submit" class="vp-btn-primary">Delete Recipe</button>
        </div>
    </form>
</section>
{% endblock %}
