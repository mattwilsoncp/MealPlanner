{% extends "base.html" %}

{% block title %}Delete Recipe - Meal Planner{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="card-dark">
        <div class="p-6">
            <h1 class="text-2xl font-medium">Delete Recipe?</h1>
            <p class="py-4">
                Are you sure you want to delete "<strong>{{ object.title }}</strong>"?
                This action cannot be undone.
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="flex justify-end gap-2">
                    <a href="{% url 'recipes:recipe_detail' object.pk %}" class="btn-ghost">Cancel</a>
                    <button type="submit" class="btn-ghost" style="color: #fc7981;">Delete</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
