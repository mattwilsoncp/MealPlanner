services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: meal_planner
      POSTGRES_USER: meal_planner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - meal-planning:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meal_planner -d meal_planner"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      DATABASE_URL: postgres://meal_planner:${POSTGRES_PASSWORD}@db:5432/meal_planner
      POSTGRES_HOST: db
      POSTGRES_DB: meal_planner
      POSTGRES_USER: meal_planner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
    volumes:
      - ./media:/app/media
    ports:
      - "8000:8000"

volumes:
  meal-planning: