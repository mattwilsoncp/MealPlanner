services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: meal_planner
      POSTGRES_USER: meal_planner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meal_planner_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meal_planner -d meal_planner"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DATABASE_URL: postgres://meal_planner:${POSTGRES_PASSWORD:-meal_planner_dev}@db:5432/meal_planner
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8008:8000"

volumes:
  pgdata:
  media_data:
